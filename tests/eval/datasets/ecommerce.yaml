# ecommerce smoke dataset — 30 cases
# Entities: buyers, products, carts, orders, reviews
# Columns:
#   buyers: buyerId, email, memberSince, loyaltyTier, totalSpent
#   products: sku, name, category, price, stockQty
#   carts: cartId, createdAt, itemCount, subtotal
#   orders: orderId, orderDate, status, total, shippingMethod
#   reviews: reviewId, rating, title, body, verified

# ── READ (12) ─────────────────────────────────────────────────────────────────

- id: ecommerce-001
  question: How many buyers are registered in the system?
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT COUNT(*) AS count
      FROM buyers
  tags: [smoke, baseline]

- id: ecommerce-002
  question: Show me the top 5 buyers by total spend
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT buyerId, email, totalSpent
      FROM buyers
      ORDER BY totalSpent DESC
      LIMIT 5
  tags: [smoke]

- id: ecommerce-003
  question: List all products in the Electronics category
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT sku, name, price, stockQty
      FROM products
      WHERE category = 'Electronics'
  tags: [smoke]

- id: ecommerce-004
  question: What is the average total of all orders?
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT AVG(total) AS avg_order_total
      FROM orders
  tags: [smoke, baseline]

- id: ecommerce-005
  question: Show all orders that are currently in pending status
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT orderId, orderDate, total, shippingMethod
      FROM orders
      WHERE status = 'pending'
  tags: [smoke]

- id: ecommerce-006
  question: Which products have fewer than 5 items left in stock?
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT sku, name, category, price, stockQty
      FROM products
      WHERE stockQty < 5
  tags: [smoke, regression]

- id: ecommerce-007
  question: Show buyers who have a Gold or Platinum loyalty tier
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT buyerId, email, loyaltyTier, totalSpent
      FROM buyers
      WHERE loyaltyTier IN ('Gold', 'Platinum')
  tags: [smoke]

- id: ecommerce-008
  question: What are the top 3 product categories ranked by total revenue?
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: sql_equivalent
    expected_sql: |
      SELECT p.category, SUM(p.price) AS total_revenue
      FROM products p
      GROUP BY p.category
      ORDER BY total_revenue DESC
      LIMIT 3
  tags: [smoke]

- id: ecommerce-009
  question: How many orders were placed in the last 30 days?
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: intent_only
    expected_intent: READ
  tags: [smoke]

- id: ecommerce-010
  question: Which products cost more than $100?
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: substring_contains
    must_contain: [price, products]
  tags: [smoke]

- id: ecommerce-011
  question: Who is our highest-spending buyer?
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: substring_contains
    must_contain: [buyer, total]
  tags: [smoke]

- id: ecommerce-012
  question: Show all 5-star reviews posted this month
  domain: ecommerce
  expected_intent: READ
  expected:
    kind: substring_contains
    must_contain: [rating, review]
  tags: [smoke]

