# ── ANALYZE (6) ───────────────────────────────────────────────────────────────

- id: ecommerce-017
  question: Compare total revenue by month for the current year
  domain: ecommerce
  expected_intent: ANALYZE
  expected:
    kind: intent_only
    expected_intent: ANALYZE
  tags: [smoke]

- id: ecommerce-018
  question: What is the trend in average order value over the past quarter?
  domain: ecommerce
  expected_intent: ANALYZE
  expected:
    kind: llm_judge
    rubric: |
      The response should describe a temporal trend in average order value.
      It must mention at least one time period (e.g. month or week),
      state whether the trend is increasing, decreasing, or flat,
      and cite specific numeric values to support the claim.
  tags: [smoke]

- id: ecommerce-019
  question: Break down order count by the loyalty tier of the buyer
  domain: ecommerce
  expected_intent: ANALYZE
  expected:
    kind: intent_only
    expected_intent: ANALYZE
  tags: [smoke]

- id: ecommerce-020
  question: Which product category has the highest average review rating?
  domain: ecommerce
  expected_intent: ANALYZE
  expected:
