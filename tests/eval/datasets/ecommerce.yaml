    expected_intent: ANALYZE
  tags: [smoke]

- id: ecommerce-021
  question: Identify buyers who are at risk of churning — no order placed in the last 90 days
  domain: ecommerce
  expected_intent: ANALYZE
  expected:
    kind: llm_judge
    rubric: |
      The response should identify buyers with no recent orders.
      It must define the inactivity threshold (90 days),
      list or count the at-risk buyers,
      and optionally suggest a retention action.
  tags: [smoke, regression]

- id: ecommerce-022
  question: How does the cart abandonment rate compare between high-value and standard buyers?
  domain: ecommerce
  expected_intent: ANALYZE
  expected:
