llm:
  provider: vertex
  model: gemini-3.1-pro-preview
  temperature: 0.0

vertex:
  project: mydevproject20260304
  location: global
  credentials: /home/openclaw/mydevproject20260304-bfafddb22b0d.json

ollama:
  host: http://localhost:11434
  model: llama3
  timeout: 120

openai:
  api_key: ""           # set OPENAI_API_KEY env var, or use config.local.yaml
  model: gpt-4o
  base_url: https://api.openai.com/v1

openrouter:
  api_key: ""           # set OPENROUTER_API_KEY env var, or use config.local.yaml
  model: anthropic/claude-3.5-sonnet   # any model at openrouter.ai/models
  base_url: https://openrouter.ai/api/v1
  site_url: ""          # optional: your app URL for OpenRouter analytics
  app_name: ontology-aip-agent

database:
  type: sqlite        # sqlite | starrocks — future StarRocksExecutor reads this
  path: ./data/
  mock_rows_per_table: 100
  starrocks:          # ignored when type=sqlite; populated when StarRocksExecutor is wired in
    host: localhost
    port: 9030
    user: root
    password: ""
    database: ontology_agent

permissions:
  read: auto
  write: confirm
  delete: confirm
  admin: deny

langfuse:
  enabled: false              # 改为 true 开启追踪
  public_key: ""              # LANGFUSE_PUBLIC_KEY 或 config.local.yaml
  secret_key: ""              # LANGFUSE_SECRET_KEY 或 config.local.yaml
  host: https://cloud.langfuse.com   # 自托管时改为内网地址
  project: ontology-aip-agent
